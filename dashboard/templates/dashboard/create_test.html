{% extends 'dashboard/teacher_base.html' %}

{% block teacher_content %}

<style>
.test-form-card{
    background:#fff;
    border-radius:24px;
    padding:34px;
    box-shadow:0 18px 45px rgba(15,23,42,.08);
}

.test-form-card h1{
    font-size:38px;
    font-weight:900;
    margin-bottom:8px;
}

.test-form-card p{
    color:#64748b;
    margin-bottom:25px;
}

.form-control,
.form-select{
    width:100%;
    border:1px solid #dbe2ea;
    border-radius:14px;
    padding:14px;
    min-height:52px;
    margin-bottom:16px;
}

.question-box{
    background:#f8fafc;
    border:1px solid #e2e8f0;
    border-radius:22px;
    padding:22px;
    margin-bottom:20px;
}

.question-title{
    font-size:22px;
    font-weight:900;
    margin-bottom:15px;
}

.grid-2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.btn-add{
    border:none;
    padding:14px 22px;
    border-radius:15px;
    font-weight:900;
    background:#eef2ff;
    color:#4338ca;
    margin-right:10px;
}

.btn-save{
    border:none;
    padding:14px 26px;
    border-radius:15px;
    font-weight:900;
    color:#fff;
    background:linear-gradient(135deg,#7c3aed,#c026d3);
    box-shadow:0 12px 25px rgba(124,58,237,.25);
}

@media(max-width:800px){
    .grid-2{
        grid-template-columns:1fr;
    }
}
</style>

<div class="test-form-card">
    <h1>Test yaratish</h1>
    <p>Teacher nechta savol kerak bo‘lsa, shuncha savol qo‘shib test yaratadi.</p>

    <form method="post">
        {% csrf_token %}

        <label>Guruh</label>
        <select name="group" class="form-select" required>
            <option value="">Guruh tanlang</option>
            {% for group in groups %}
                <option value="{{ group.id }}">{{ group.name }}</option>
            {% endfor %}
        </select>

        <label>Test nomi</label>
        <input type="text" name="title" class="form-control" placeholder="Masalan: Python 20 talik test" required>

        <label>Test haqida qisqa izoh</label>
        <textarea name="description" class="form-control" placeholder="Masalan: Python asoslari bo‘yicha test"></textarea>

        <div id="questionsArea">

            <div class="question-box">
                <div class="question-title">1-savol</div>

                <label>Savol</label>
                <textarea name="question[]" class="form-control" required></textarea>

                <div class="grid-2">
                    <input type="text" name="option_a[]" class="form-control" placeholder="A variant" required>
                    <input type="text" name="option_b[]" class="form-control" placeholder="B variant" required>
                    <input type="text" name="option_c[]" class="form-control" placeholder="C variant" required>
                    <input type="text" name="option_d[]" class="form-control" placeholder="D variant" required>
                </div>

                <label>To‘g‘ri javob</label>
                <select name="correct_answer[]" class="form-select" required>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                </select>
            </div>

        </div>

        <button type="button" class="btn-add" onclick="addQuestion()">
            + Savol qo‘shish
        </button>

        <button type="submit" class="btn-save">
            Testni saqlash
        </button>
    </form>
</div>

<script>
let questionCount = 1;

function addQuestion(){
    questionCount++;

    const area = document.getElementById('questionsArea');

    const box = document.createElement('div');
    box.className = 'question-box';

    box.innerHTML = `
        <div class="question-title">${questionCount}-savol</div>

        <label>Savol</label>
        <textarea name="question[]" class="form-control" required></textarea>

        <div class="grid-2">
            <input type="text" name="option_a[]" class="form-control" placeholder="A variant" required>
            <input type="text" name="option_b[]" class="form-control" placeholder="B variant" required>
            <input type="text" name="option_c[]" class="form-control" placeholder="C variant" required>
            <input type="text" name="option_d[]" class="form-control" placeholder="D variant" required>
        </div>

        <label>To‘g‘ri javob</label>
        <select name="correct_answer[]" class="form-select" required>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
        </select>
    `;

    area.appendChild(box);
}
</script>

{% endblock %}
