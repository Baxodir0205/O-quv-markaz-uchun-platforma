{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<style>
nav, .navbar, .custom-navbar, footer, .site-footer{
    display:none !important;
}

*{
    box-sizing:border-box;
}

html, body{
    margin:0;
    padding:0;
    overflow-x:hidden;
    background:#eef2f7;
    font-family:Arial, Helvetica, sans-serif;
}

main{
    margin:0 !important;
    padding:0 !important;
}

.panel-layout{
    display:flex;
    min-height:100vh;
    width:100%;
    background:
        radial-gradient(circle at top left, rgba(124,58,237,.14), transparent 32%),
        radial-gradient(circle at bottom right, rgba(6,182,212,.12), transparent 35%),
        #eef2f7;
}

.panel-sidebar{
    width:280px;
    min-height:100vh;
    background:linear-gradient(180deg,#09002f,#15005c);
    padding:34px 22px;
    flex-shrink:0;
    box-shadow:18px 0 45px rgba(15,23,42,.18);
}

.panel-logo{
    color:#ffffff;
    font-size:34px;
    font-weight:900;
    margin-bottom:38px;
    line-height:1.15;
}

.panel-link{
    display:flex;
    align-items:center;
    gap:12px;
    color:#ffffff !important;
    text-decoration:none;
    padding:15px 18px;
    border-radius:16px;
    margin-bottom:12px;
    font-weight:900;
    transition:.25s;
    opacity:.92;
}

.panel-link:hover,
.panel-link.active{
    background:linear-gradient(90deg,#6d28d9,#d946ef);
    color:#ffffff !important;
    opacity:1;
    transform:translateX(5px);
    box-shadow:0 12px 24px rgba(217,70,239,.22);
}

.logout-normal{
    margin-top:30px;
}

.panel-content{
    flex:1;
    width:calc(100% - 280px);
    padding:42px 46px;
    background:transparent;
}

.student-card{
    background:#ffffff;
    border-radius:26px;
    padding:28px;
    box-shadow:0 16px 40px rgba(15,23,42,0.08);
    border:1px solid rgba(255,255,255,.85);
}

.page-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    margin-bottom:24px;
}

.page-top h1{
    margin:0;
    font-size:34px;
    font-weight:900;
    color:#0f172a;
}

.page-top p{
    margin-top:8px;
    color:#64748b;
    font-size:16px;
    font-weight:700;
}

.btn-main{
    display:inline-block;
    text-decoration:none;
    border:none;
    padding:14px 22px;
    border-radius:15px;
    font-weight:900;
    color:#ffffff !important;
    background:linear-gradient(135deg,#7c3aed,#c026d3);
    box-shadow:0 12px 25px rgba(124,58,237,0.25);
    cursor:pointer;
}

.btn-back{
    display:inline-block;
    text-decoration:none;
    padding:12px 18px;
    border-radius:14px;
    font-weight:900;
    background:#eef2ff;
    color:#4338ca !important;
    margin-bottom:18px;
}

.badge-soft{
    background:#eef2ff;
    color:#4338ca;
    padding:9px 14px;
    border-radius:999px;
    font-weight:900;
    font-size:14px;
}

.mt-4{
    margin-top:24px;
}

.text-end{
    text-align:right;
}

.text-center{
    text-align:center;
}

@media(max-width:900px){
    .panel-layout{
        flex-direction:column;
    }

    .panel-sidebar{
        width:100%;
        min-height:auto;
    }

    .panel-content{
        width:100%;
        padding:24px;
    }

    .page-top{
        flex-direction:column;
        align-items:flex-start;
    }

    .text-end{
        text-align:left;
    }
}
</style>
{% endblock %}

{% block content %}
<div class="panel-layout">

    <aside class="panel-sidebar">
        <div class="panel-logo">CaseEdu<br>Student</div>

        <a href="/student/" class="panel-link">🏠 Dashboard</a>
        <a href="/student/lessons/" class="panel-link">📚 Lessons</a>
        <a href="/student/assignments/" class="panel-link">📝 Assignments</a>
        <a href="/student/tests/" class="panel-link">🧠 Tests</a>
        <a href="/student/cases/" class="panel-link">⚡ Case Study</a>

        <a href="/logout/" class="panel-link logout-normal">🚪 Logout</a>
    </aside>

    <section class="panel-content">
        {% block content_student %}{% endblock %}
    </section>

</div>
{% endblock %}
