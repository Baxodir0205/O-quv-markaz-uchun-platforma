{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block extra_css %}
<style>
nav, .navbar, .custom-navbar, footer, .site-footer{
    display:none !important;
}

html, body{
    margin:0;
    padding:0;
    min-height:100vh;
}

main{
    margin:0 !important;
    padding:0 !important;
}

.login-page{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    background:
        radial-gradient(circle at top left,#dbeafe 0%,transparent 32%),
        radial-gradient(circle at bottom right,#f5d0fe 0%,transparent 35%),
        linear-gradient(135deg,#f8fbff,#eef2ff);
}

.login-card{
    width:100%;
    max-width:430px;
    background:rgba(255,255,255,.95);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.8);
    border-radius:30px;
    padding:42px;
    box-shadow:0 30px 80px rgba(79,70,229,.18);
}

.login-logo{
    text-align:center;
    font-size:34px;
    font-weight:900;
    color:#4f46e5;
    margin-bottom:8px;
}

.login-card h2{
    text-align:center;
    font-size:30px;
    font-weight:900;
    color:#0f172a;
    margin-bottom:8px;
}

.login-subtitle{
    text-align:center;
    color:#64748b;
    margin-bottom:28px;
    font-weight:600;
}

.form-control{
    width:100%;
    height:54px;
    border-radius:16px;
    border:1px solid #dbe2ea;
    padding:0 16px;
    margin-bottom:16px;
    background:#f8fafc;
    font-weight:700;
    outline:none;
}

.form-control:focus{
    border-color:#7c3aed;
    box-shadow:0 0 0 4px rgba(124,58,237,.12);
}

.login-btn{
    width:100%;
    height:56px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#4f46e5,#c026d3);
    color:#fff;
    font-size:16px;
    font-weight:900;
    cursor:pointer;
    box-shadow:0 14px 30px rgba(124,58,237,.28);
}
</style>
{% endblock %}

{% block content %}
<div class="login-page">

    <div class="login-card">
        <div class="login-logo">CaseEdu</div>

        <h2>Tizimga kirish</h2>

     

        <form method="post">
            {% csrf_token %}

            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Username"
                   required>

            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Parol"
                   required>

            <button type="submit" class="login-btn">
                Tizimga kirish
            </button>
        </form>
    </div>

</div>
{% endblock %}
