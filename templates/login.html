{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block extra_css %}
<style>
nav, .navbar, .custom-navbar, footer, .site-footer{
    display:none !important;
}

html, body{
    margin:0;
    padding:0;
    min-height:100vh;
    background:#111827;
}

main{
    margin:0 !important;
    padding:0 !important;
}

.login-page{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#0f172a,#111827);
    padding:20px;
}

.login-card{
    width:100%;
    max-width:420px;
    background:#ffffff;
    border-radius:22px;
    padding:38px;
    box-shadow:0 25px 70px rgba(0,0,0,.25);
}

.login-card h2{
    text-align:center;
    font-size:30px;
    font-weight:900;
    color:#0f172a;
    margin-bottom:26px;
}

.form-control{
    width:100%;
    height:52px;
    border-radius:14px;
    border:1px solid #cbd5e1;
    padding:0 15px;
    margin-bottom:14px;
    background:#eaf1ff;
    font-weight:700;
}

.login-btn{
    width:100%;
    height:54px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#304ffe,#00bcd4);
    color:#fff;
    font-size:16px;
    font-weight:900;
    cursor:pointer;
}

.alert-box{
    background:#fee2e2;
    color:#991b1b;
    padding:12px 14px;
    border-radius:12px;
    margin-bottom:16px;
    font-weight:800;
    text-align:center;
}
</style>
{% endblock %}

{% block content %}
<div class="login-page">

    <div class="login-card">
        <h2>Tizimga kirish</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="alert-box">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post" action="">
            {% csrf_token %}

            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Username"
                   required>

            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Parol"
                   required>

            <button type="submit" class="login-btn">
                Login
            </button>
        </form>
    </div>

</div>
{% endblock %}
